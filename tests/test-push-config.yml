name: Test push configuration inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          name: my-cache
          authToken: "dummy-auth-token"
          pathsToPush: "/nix/store/fake-path"
          pushFilter: "(-source$|nixpkgs\\.tar\\.gz$)"
          skipPush: "true"
          skipAddingSubstituter: "true"
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (outcome: ${{ steps.action.outcome }})"
          echo "PASS: action step executed with pathsToPush and pushFilter"
