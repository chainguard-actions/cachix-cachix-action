name: Test cachixArgs and cachixBin inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create fake cachix binary
        run: |
          mkdir -p /tmp/fake-cachix
          cat > /tmp/fake-cachix/cachix <<'EOF'
          #!/bin/sh
          echo "fake cachix called with: $@"
          exit 0
          EOF
          chmod +x /tmp/fake-cachix/cachix
      - id: action
        uses: .
        with:
          name: my-cache
          cachixArgs: "-j4"
          cachixBin: "/tmp/fake-cachix/cachix"
          skipPush: "true"
        continue-on-error: true
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME"
