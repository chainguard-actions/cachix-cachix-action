name: Test pathsToPush, pushFilter, and signingKey inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          name: my-cache
          authToken: fake-auth-token
          signingKey: fake-signing-key
          pathsToPush: "/nix/store/fake-path"
          pushFilter: "(-source$|nixpkgs\\.tar\\.gz$)"
          skipPush: "true"
        continue-on-error: true
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME"
