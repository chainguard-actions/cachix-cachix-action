name: Test extra pull names input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          name: my-cache
          extraPullNames: "nixpkgs,nix-community"
          skipPush: "true"
          skipAddingSubstituter: "true"
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (outcome: ${{ steps.action.outcome }})"
          echo "PASS: action step executed with extraPullNames"
